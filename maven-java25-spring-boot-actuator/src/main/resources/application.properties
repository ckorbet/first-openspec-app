# Spring Boot Application Configuration

# Application Name and Version
spring.application.name=spring-boot-java25-actuator
app.version=1.0.0

# Server Configuration
server.port=8080

# Actuator Configuration - Enable all endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=when-authorized

# Application Info
info.app.name=Spring Boot Java 21 with Actuator
info.app.description=A Maven + Java 21 + Spring Boot application with Actuator starter
info.app.version=${project.version}
info.app.encoding=${project.build.sourceEncoding}
info.app.java.version=21

# Logging Configuration (using SLF4J with Logback)
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
